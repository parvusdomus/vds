<form class="{{cssClass}} fichaItem" autocomplete="off">
    <div class="armor_name"><h1><input name="name" type="text" value="{{item.name}}" placeholder="Name"/></h1></div>
    <div  class="ItemInfo">
        <h2><label for="system.Hits.value">Hits</label></h2>
        <input name="system.Hits.value" type="number" value="{{item.system.Hits.value}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Hits.value">Max. Hits</label></h2>
        <input name="system.Hits.max" type="number" value="{{item.system.Hits.max}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Material">Material</label></h2>
        <input name="system.Material" type="text" value="{{item.system.Material}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Tags">Tags</label></h2>
        <input name="system.Tags" type="text" value="{{item.system.Tags}}"/>
    </div>
    <div class="ItemInfo">
        <h2><label for="system.Stat">Stat</label></h2>
        <input name="system.Stat" type="text" value="{{item.system.Stat}}"/>
    </div>
    <div class="ItemInfo">
        <h2><label for="system.Bonus_To_Roll">Bonus</label></h2>
        <input name="system.Bonus_To_Roll" type="number" value="{{item.system.Bonus_To_Roll}}"/>
    </div>
    <div class="Bonus_title"><h1>Bonus to Stats</h1></div>
    <div  class="ItemInfo">
        <h2><label for="system.Bonus.Power">Power</label></h2>
        <input name="system.Bonus.Power" type="number" value="{{item.system.Bonus.Power}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Bonus.Aim">Aim</label></h2>
        <input name="system.Bonus.Aim" type="number" value="{{item.system.Bonus.Aim}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Bonus.Wits">Wits</label></h2>
        <input name="system.Bonus.Wits" type="number" value="{{item.system.Bonus.Wits}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Bonus.Guts">Guts</label></h2>
        <input name="system.Bonus.Guts" type="number" value="{{item.system.Bonus.Guts}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Bonus.Speed">Speed</label></h2>
        <input name="system.Bonus.Speed" type="number" value="{{item.system.Bonus.Speed}}"/>
    </div>
    <div  class="ItemInfo">
        <h2><label for="system.Bonus.Resolve">Resolve</label></h2>
        <input name="system.Bonus.Resolve" type="number" value="{{item.system.Bonus.Resolve}}"/>
    </div>
    <div class="item_editor">
        {{editor item.system.Description target="system.Description" button=true owner=owner editable=true}}
    </div>        
</form>
